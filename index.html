<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#c9d8f0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden; width:100vw; height:100vh; }
#graph { width:100vw; height:100vh; display:block; }
.link { stroke-opacity:0.3; transition:stroke-opacity 0.2s; }
.node circle { cursor:pointer; }
.node text { pointer-events:none; user-select:none; }

/* ── TOP BAR ── */
#topbar {
  position:fixed; top:0; left:0; right:0; height:52px;
  background:rgba(13,17,23,0.92); border-bottom:1px solid rgba(92,133,255,0.15);
  backdrop-filter:blur(12px); display:flex; align-items:center; gap:12px;
  padding:0 18px; z-index:200;
}
#topbar h1 { font-size:14px; font-weight:700; color:#FFD700; white-space:nowrap; letter-spacing:0.03em; margin-right:4px; }
#topbar .sep { width:1px; height:24px; background:rgba(92,133,255,0.2); }
#search { background:rgba(255,255,255,0.06); border:1px solid rgba(92,133,255,0.2); border-radius:20px; padding:6px 14px 6px 32px; color:#c9d8f0; font-size:13px; outline:none; width:200px; }
#search::placeholder { color:#4a5e80; }
#search:focus { border-color:rgba(120,160,255,0.5); background:rgba(255,255,255,0.09); }
.search-icon { position:absolute; left:195px; top:50%; transform:translateY(-50%); color:#4a5e80; font-size:14px; pointer-events:none; }
#stats-bar { display:flex; gap:16px; font-size:12px; color:#6b7fa3; }
#stats-bar strong { color:#78a0ff; }
.btn { background:rgba(92,133,255,0.12); border:1px solid rgba(92,133,255,0.22); border-radius:6px; color:#78a0ff; padding:5px 12px; font-size:12px; cursor:pointer; white-space:nowrap; transition:all 0.15s; }
.btn:hover { background:rgba(92,133,255,0.22); color:#a8c0ff; }
.btn.active { background:rgba(92,133,255,0.28); color:#c0d4ff; border-color:rgba(92,133,255,0.5); }
#topbar .spacer { flex:1; }

/* ── CATEGORY FILTERS ── */
#filters {
  position:fixed; top:52px; left:0; right:0;
  background:rgba(10,14,22,0.88); border-bottom:1px solid rgba(92,133,255,0.1);
  backdrop-filter:blur(8px); display:flex; align-items:center; gap:6px;
  padding:7px 18px; z-index:190; flex-wrap:wrap;
}
.filter-chip {
  display:flex; align-items:center; gap:5px;
  padding:3px 10px 3px 8px; border-radius:20px; font-size:11px; cursor:pointer;
  border:1px solid transparent; transition:all 0.15s; user-select:none; font-weight:500;
}
.filter-chip.off { opacity:0.28; filter:saturate(0); }
.filter-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
#filters-label { font-size:11px; color:#4a5e80; text-transform:uppercase; letter-spacing:0.07em; margin-right:4px; }

/* ── SIDEBAR (node detail) ── */
#sidebar {
  position:fixed; right:0; top:52px; bottom:0; width:280px;
  background:rgba(10,14,22,0.95); border-left:1px solid rgba(92,133,255,0.12);
  backdrop-filter:blur(12px); z-index:150; transform:translateX(100%);
  transition:transform 0.25s ease; overflow-y:auto; padding:18px;
}
#sidebar.open { transform:translateX(0); }
#sidebar h2 { font-size:16px; font-weight:700; margin-bottom:4px; line-height:1.3; }
#sidebar .sb-group { font-size:11px; text-transform:uppercase; letter-spacing:0.08em; opacity:0.5; margin-bottom:14px; }
#sidebar .sb-section { margin-bottom:16px; }
#sidebar .sb-label { font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:#5c85ff; margin-bottom:6px; font-weight:600; }
#sidebar .sb-stat { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; border-bottom:1px solid rgba(92,133,255,0.06); }
#sidebar .sb-stat span:last-child { color:#a8c0ff; font-weight:600; }
#sb-neighbors { display:flex; flex-wrap:wrap; gap:5px; }
.neighbor-tag { background:rgba(92,133,255,0.1); border:1px solid rgba(92,133,255,0.2); border-radius:4px; padding:2px 8px; font-size:11px; color:#78a0ff; cursor:pointer; transition:all 0.12s; }
.neighbor-tag:hover { background:rgba(92,133,255,0.2); }
#sidebar-close { position:absolute; top:12px; right:12px; background:none; border:none; color:#4a5e80; font-size:18px; cursor:pointer; line-height:1; }
#sidebar-close:hover { color:#c9d8f0; }

/* ── STATS PANEL ── */
#stats-panel {
  position:fixed; left:18px; bottom:18px; width:240px;
  background:rgba(10,14,22,0.92); border:1px solid rgba(92,133,255,0.12);
  border-radius:10px; backdrop-filter:blur(8px); padding:14px; z-index:150;
}
#stats-panel h3 { font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:#5c85ff; margin-bottom:10px; }
.top-node { display:flex; align-items:center; justify-content:space-between; padding:4px 0; font-size:12px; cursor:pointer; }
.top-node:hover .tn-name { color:#a8c0ff; }
.tn-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-right:6px; }
.tn-name { color:#c9d8f0; flex:1; }
.tn-count { color:#5c85ff; font-size:11px; background:rgba(92,133,255,0.1); padding:1px 6px; border-radius:10px; }
#sp-toggle { position:absolute; top:8px; right:10px; background:none; border:none; color:#4a5e80; cursor:pointer; font-size:12px; }

/* ── MINI MAP ── */
#minimap-wrap {
  position:fixed; right:18px; bottom:18px;
  background:rgba(10,14,22,0.9); border:1px solid rgba(92,133,255,0.12);
  border-radius:8px; overflow:hidden; z-index:150;
}

/* ── CONTROLS HINT ── */
#controls { position:fixed; right:18px; bottom:90px; font-size:10px; color:#3a4e6e; text-align:right; line-height:1.9; }

/* ── TOOLTIP ── */
#tooltip {
  position:fixed; background:rgba(10,14,22,0.96); border:1px solid rgba(92,133,255,0.25);
  border-radius:8px; padding:9px 13px; font-size:12px; pointer-events:none;

}
#tooltip .tt-name { font-weight:700; font-size:13px; margin-bottom:2px; }
#tooltip .tt-group { font-size:10px; opacity:0.5; text-transform:uppercase; letter-spacing:0.07em; }
#tooltip .tt-cnt { font-size:11px; color:#78a0ff; margin-top:3px; }
</style>
</head>

  chip.className = 'filter-chip';
  chip.dataset.group = g;
  chip.innerHTML = `<div class="filter-dot" style="background:${COLORS[g]||'#aaa'}"></div>${GROUP_LABEL[g]||g}`;
  chip.style.background = (COLORS[g]||'#aaa')+'18';
  chip.style.borderColor = (COLORS[g]||'#aaa')+'44';
  chip.style.color = COLORS[g]||'#aaa';
  chip.addEventListener('click', ()=>{ filterState[g]=!filterState[g]; chip.classList.toggle('off',!filterState[g]); applyFilter(); });
  filterBar.appendChild(chip);
});

// ─────────────────────────────────────────────
//  D3 SETUP
// ─────────────────────────────────────────────
const svg = d3.select('#graph');
const W = window.innerWidth, H = window.innerHeight - 88;
svg.attr('width',W).attr('height',H);
const g = svg.append('g');

const defs = svg.append('defs');
// Glow filter
const glow = defs.append('filter').attr('id','glow');
glow.append('feGaussianBlur').attr('stdDeviation','3.5').attr('result','blur');
const fm = glow.append('feMerge');
fm.append('feMergeNode').attr('in','blur');
fm.append('feMergeNode').attr('in','SourceGraphic');

// Arrow markers
groups.forEach(grp=>{
  const color = COLORS[grp]||'#aaa';
  defs.append('marker')
    .attr('id',`arrow-${grp}`)
    .attr('viewBox','0 -4 8 8').attr('refX',14).attr('refY',0)
    .attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
    .append('path').attr('d','M0,-4L8,0L0,4').attr('fill',color).attr('opacity',0.6);
});

// Zoom
const zoom = d3.zoom().scaleExtent([0.1,5])
  .on('zoom', e=>g.attr('transform',e.transform));
svg.call(zoom);
svg.call(zoom.transform, d3.zoomIdentity.translate(W/2,H/2).scale(0.55));

// Simulation
const sim = d3.forceSimulation(RAW_NODES)
  .force('link', d3.forceLink(links).id(d=>d.id).distance(d=>{
    const sg=typeof d.source==='object'?d.source.group:d.source,
          tg=typeof d.target==='object'?d.target.group:d.target;
    if(sg==='moc'&&tg==='moc') return 130;
    if(sg==='moc'||tg==='moc') return 95;
    if(sg==='propiedad'||tg==='propiedad') return 60;
    return 80;
  }).strength(0.5))
  .force('charge', d3.forceManyBody().strength(d=>{
    if(d.group==='moc') return -700;
    if(d.group==='propiedad') return -120;
    return -280;
  }))
  .force('collide', d3.forceCollide().radius(d=>nodeR(d)+10))
  .force('center', d3.forceCenter(0,0))
  .force('x', d3.forceX(0).strength(0.03))
  .force('y', d3.forceY(0).strength(0.03));

function nodeR(d){
  const base = d.group==='moc'?16 : d.group==='propiedad'?7 : 10;
  return base + Math.sqrt((degree[d.id]||0))*2.2;
}

// ── Render ──
let showLabels = true, showArrows = true;

const linkSel = g.append('g').selectAll('line').data(links).join('line')
  .attr('class','link')
  .attr('stroke', d=>{
    const sg = typeof d.source==='object'?d.source.group:'moc';
    return COLORS[sg]||'#4466aa';
  })
  .attr('stroke-width', d=>{
    const sg=typeof d.source==='object'?d.source.group:'',
          tg=typeof d.target==='object'?d.target.group:'';
    return (sg==='moc'||tg==='moc')?1.8:0.9;
  })
  .attr('marker-end', d=>{
    const sg=typeof d.source==='object'?d.source.group:'moc';
    return `url(#arrow-${sg})`;
  });

// MOC halo rings
const haloSel = g.append('g').selectAll('circle').data(RAW_NODES.filter(d=>d.group==='moc')).join('circle')
  .attr('r',d=>nodeR(d)+7).attr('fill','none')
  .attr('stroke',d=>COLORS[d.group]).attr('stroke-opacity',0.18).attr('stroke-width',8)
  .attr('filter','url(#glow)');

const nodeSel = g.append('g').selectAll('g').data(RAW_NODES).join('g').attr('class','node')
  .call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);}))
  .on('dblclick',(e,d)=>{d.fx=null;d.fy=null;sim.alpha(0.3).restart();});

nodeSel.append('circle')
  .attr('r',d=>nodeR(d))
  .attr('fill',d=>COLORS[d.group]||'#aaa')
  .attr('fill-opacity',d=>d.group==='propiedad'?0.6:0.82)
  .attr('stroke',d=>COLORS[d.group]||'#aaa').attr('stroke-width',1.8)
  .attr('filter',d=>d.group==='moc'?'url(#glow)':null);

const labelSel = nodeSel.append('text')
  .text(d=>d.label)
  .attr('x',d=>nodeR(d)+5).attr('y',4)
  .attr('font-size',d=>d.group==='moc'?12.5:d.group==='propiedad'?9:10.5)
  .attr('font-weight',d=>d.group==='moc'?'700':'400')
  .attr('fill',d=>d.group==='moc'?COLORS[d.group]:'#b8ccee')
  .attr('opacity',d=>d.group==='propiedad'?0.7:0.88);

// ── Tooltip ──
const tt = document.getElementById('tooltip');
nodeSel.on('mouseover',(e,d)=>{
  document.getElementById('tt-n').textContent = d.label;
  document.getElementById('tt-g').textContent = GROUP_LABEL[d.group]||d.group;
  document.getElementById('tt-c').textContent = `↑${outDeg[d.id]||0} out  ↓${inDeg[d.id]||0} in  ·  ${degree[d.id]||0} total`;
  tt.style.opacity='1';
}).on('mousemove',e=>{
  tt.style.left=(e.clientX+16)+'px'; tt.style.top=(e.clientY-12)+'px';
}).on('mouseout',()=>tt.style.opacity='0');

// ── Sidebar ──
const sidebar = document.getElementById('sidebar');
document.getElementById('sidebar-close').addEventListener('click',()=>sidebar.classList.remove('open'));

nodeSel.on('click',(e,d)=>{
  e.stopPropagation();
  openSidebar(d);
  highlightNode(d.id);
});
svg.on('click',()=>{ sidebar.classList.remove('open'); clearHighlight(); });

function openSidebar(d){
  sidebar.classList.add('open');
  document.getElementById('sb-title').textContent = d.label;
  document.getElementById('sb-title').style.color = COLORS[d.group]||'#c9d8f0';
  document.getElementById('sb-group').textContent = GROUP_LABEL[d.group]||d.group;
  document.getElementById('sb-degree').textContent = degree[d.id]||0;
  document.getElementById('sb-in').textContent = inDeg[d.id]||0;
  document.getElementById('sb-out').textContent = outDeg[d.id]||0;
  // neighbors
  const neighbors = new Set();
  links.forEach(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    if(s===d.id) neighbors.add(t);
    if(t===d.id) neighbors.add(s);
  });
  document.getElementById('sb-ncount').textContent = neighbors.size;
  const nb = document.getElementById('sb-neighbors');
  nb.innerHTML='';
  [...neighbors].sort().forEach(nid=>{
    const nn = nodeMap[nid];
    if(!nn) return;
    const tag = document.createElement('span');
    tag.className='neighbor-tag';
    tag.textContent=nn.label;
    tag.style.borderColor=(COLORS[nn.group]||'#aaa')+'44';
    tag.style.color=COLORS[nn.group]||'#aaa';
    tag.addEventListener('click',e=>{e.stopPropagation();openSidebar(nn);highlightNode(nn.id);});
    nb.appendChild(tag);
  });
}

function highlightNode(id){
  const conn = new Set([id]);
  links.forEach(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    if(s===id) conn.add(t);
    if(t===id) conn.add(s);
  });
  nodeSel.style('opacity',d=>conn.has(d.id)?1:0.1);
  linkSel.style('stroke-opacity',l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return (s===id||t===id)?0.8:0.03;
  });
  haloSel.style('opacity',d=>conn.has(d.id)?1:0.05);
}
function clearHighlight(){
  nodeSel.style('opacity',d=>filterState[d.group]?1:0);
  linkSel.style('stroke-opacity',0.3);
  haloSel.style('opacity',1);
}

// ── Filter ──
function applyFilter(){
  const visible = RAW_NODES.filter(n=>filterState[n.group]);
  document.getElementById('sv').textContent = visible.length;
  nodeSel.style('opacity',d=>filterState[d.group]?1:0).style('pointer-events',d=>filterState[d.group]?'all':'none');
  haloSel.style('opacity',d=>filterState[d.group]?1:0);
  linkSel.style('opacity',l=>{
    const sg=typeof l.source==='object'?l.source.group:'';
    const tg=typeof l.target==='object'?l.target.group:'';
    return (filterState[sg]&&filterState[tg])?1:0;
  });
}

// ── Search ──
document.getElementById('search').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  if(!q){clearHighlight();return;}
  const matched=RAW_NODES.filter(n=>n.label.toLowerCase().includes(q)).map(n=>n.id);
  nodeSel.style('opacity',d=>matched.includes(d.id)?1:0.08);
  linkSel.style('stroke-opacity',l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return matched.includes(s)&&matched.includes(t)?0.7:0.03;
  });
});

// ── Top nodes panel ──
const topList = document.getElementById('top-nodes-list');
const topNodes = [...RAW_NODES].sort((a,b)=>(degree[b.id]||0)-(degree[a.id]||0)).slice(0,10);
topNodes.forEach(n=>{
  const row = document.createElement('div');
  row.className='top-node';
  row.innerHTML=`<div class="tn-dot" style="background:${COLORS[n.group]}"></div><span class="tn-name">${n.label}</span><span class="tn-count">${degree[n.id]}</span>`;
  row.addEventListener('click',()=>{openSidebar(n);highlightNode(n.id);});
  topList.appendChild(row);
});
let spOpen=true;
document.getElementById('sp-toggle').addEventListener('click',()=>{
  spOpen=!spOpen;
  topList.style.display=spOpen?'block':'none';
  document.getElementById('sp-toggle').textContent=spOpen?'▾':'▸';
});

// ── Toolbar buttons ──
document.getElementById('btn-labels').addEventListener('click',function(){
  showLabels=!showLabels;
  this.classList.toggle('active',showLabels);
  labelSel.style('display',showLabels?null:'none');
});
document.getElementById('btn-arrows').addEventListener('click',function(){
  showArrows=!showArrows;
  this.classList.toggle('active',showArrows);
  linkSel.attr('marker-end',d=>{
    if(!showArrows) return null;
    const sg=typeof d.source==='object'?d.source.group:'moc';
    return `url(#arrow-${sg})`;
  });
});
let simPaused=false;
document.getElementById('btn-physics').addEventListener('click',function(){
  simPaused=!simPaused;
  this.textContent=simPaused?'Reanudar':'Pausar';
  if(simPaused) sim.stop(); else sim.alpha(0.3).restart();
});
document.getElementById('btn-reset').addEventListener('click',()=>{
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(W/2,H/2).scale(0.55));
});

// ── Tick ──
sim.on('tick',()=>{
  linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
         .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
  haloSel.attr('cx',d=>d.x).attr('cy',d=>d.y);
});

window.addEventListener('resize',()=>{
  const nW=window.innerWidth,nH=window.innerHeight-88;
  svg.attr('width',nW).attr('height',nH);
});
</script>
</body>
</html>
